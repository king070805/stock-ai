<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - StockWise</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Sans+Pro:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-left">
            <div class="brand">
                <i class="fas fa-chart-line"></i>
                <h1>StockWise</h1>
                <p>AI-Powered Stock Analysis Platform</p>
            </div>
            <div class="features">
                <div class="feature">
                    <i class="fas fa-brain"></i>
                    <span>AI-driven insights</span>
                </div>
                <div class="feature">
                    <i class="fas fa-globe"></i>
                    <span>Global market coverage</span>
                </div>
                <div class="feature">
                    <i class="fas fa-bell"></i>
                    <span>Real-time alerts</span>
                </div>
            </div>
        </div>
        <div class="auth-right">
            <div class="auth-box">
                <div class="auth-tabs">
                    <button class="auth-tab active" data-tab="password">Password</button>
                    <button class="auth-tab" data-tab="email">Email Code</button>
                </div>

                <!-- Password Login -->
                <form class="auth-form active" id="passwordForm">
                    <div class="form-group">
                        <label>Username / Email</label>
                        <input type="text" placeholder="Enter username or email" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <div class="password-input">
                            <input type="password" placeholder="Enter password" required>
                            <button type="button" class="btn-toggle-password"><i class="fas fa-eye"></i></button>
                        </div>
                    </div>
                    <div class="form-options">
                        <label class="checkbox">
                            <input type="checkbox" checked> Remember me
                        </label>
                        <a href="#" class="forgot-link">Forgot password?</a>
                    </div>
                    <button type="submit" class="btn-submit">Log In</button>
                </form>

                <!-- Email Code Login -->
                <form class="auth-form" id="emailForm">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" placeholder="Enter your email" required>
                    </div>
                    <div class="form-group">
                        <label>Verification Code</label>
                        <div class="code-input">
                            <input type="text" placeholder="Enter code" required>
                            <button type="button" class="btn-send-code">Send Code</button>
                        </div>
                    </div>
                    <button type="submit" class="btn-submit">Log In</button>
                </form>

                <div class="social-login">
                    <p>Or log in with</p>
                    <div class="social-buttons">
                        <button class="btn-social google">
                            <i class="fab fa-google"></i> Google
                        </button>
                        <button class="btn-social github">
                            <i class="fab fa-github"></i> GitHub
                        </button>
                    </div>
                </div>

                <div class="auth-footer">
                    <p>Don't have an account? <a href="#">Sign up</a></p>
                    <p class="guest-mode">Browse without login, <a href="index.html">Try it now →</a></p>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/js/auth.js"></script>
</body>
</html>
