<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 股小智</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --surface2: #1c2128;
            --border: #30363d;
            --border-light: #21262d;
            --text: #e6edf3;
            --text-secondary: #8b949e;
            --text-muted: #6e7681;
            --accent: #F0B90B;
            --accent-hover: #d4a009;
            --accent-glow: rgba(240,185,11,0.3);
            --up: #00d4aa;
            --down: #ff4757;
            --premium: #bc8cff;
            --font-heading: 'DM Sans', 'Noto Sans SC', sans-serif;
            --font-body: 'Noto Sans SC', 'DM Sans', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --radius: 8px;
            --radius-lg: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-body);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* 动态背景 */
        .bg-animation {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 0;
            overflow: hidden;
        }
        .bg-animation::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background:
                radial-gradient(ellipse at 20% 80%, rgba(240,185,11,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(188,140,255,0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(0,212,170,0.04) 0%, transparent 60%);
            animation: bgFloat 20s ease-in-out infinite;
        }
        @keyframes bgFloat {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(2%, -2%) rotate(1deg); }
            66% { transform: translate(-1%, 1%) rotate(-0.5deg); }
        }

        /* 网格背景 */
        .grid-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 1;
            background-image:
                linear-gradient(rgba(240,185,11,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(240,185,11,0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
            -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
        }

        /* 登录容器 */
        .login-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 420px;
            padding: 0 20px;
        }

        .login-card {
            background: linear-gradient(135deg, rgba(22,27,34,0.95), rgba(13,17,23,0.98));
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 40px 36px;
            backdrop-filter: blur(20px);
            box-shadow:
                0 20px 60px rgba(0,0,0,0.5),
                0 0 0 1px rgba(240,185,11,0.1),
                inset 0 1px 0 rgba(255,255,255,0.05);
            position: relative;
            overflow: hidden;
            animation: cardReveal 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        @keyframes cardReveal {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* 顶部装饰线 */
        .login-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            opacity: 0.6;
        }

        /* Logo区域 */
        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }
        .login-logo {
            width: 56px; height: 56px;
            margin: 0 auto 16px;
            position: relative;
        }
        .login-logo svg {
            width: 100%; height: 100%;
            filter: drop-shadow(0 0 12px rgba(240,185,11,0.3));
        }
        .login-title {
            font-size: 24px;
            font-weight: 700;
            font-family: var(--font-heading);
            background: linear-gradient(135deg, var(--accent), #e8a400);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
        }
        .login-subtitle {
            font-size: 13px;
            color: var(--text-muted);
            font-family: var(--font-mono);
        }

        /* 登录方式切换 */
        .login-tabs {
            display: flex;
            gap: 4px;
            background: var(--surface2);
            border-radius: var(--radius);
            padding: 4px;
            margin-bottom: 24px;
        }
        .login-tab {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
            font-family: var(--font-heading);
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s ease;
            position: relative;
        }
        .login-tab:hover { color: var(--text); }
        .login-tab.active {
            background: var(--accent);
            color: #1a1a1a;
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(240,185,11,0.2);
        }

        /* 表单区域 */
        .form-group {
            margin-bottom: 18px;
            position: relative;
        }
        .form-label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 6px;
            font-family: var(--font-heading);
        }
        .form-input {
            width: 100%;
            padding: 12px 14px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-size: 14px;
            font-family: var(--font-body);
            transition: all 0.2s ease;
            outline: none;
        }
        .form-input::placeholder { color: var(--text-muted); }
        .form-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(240,185,11,0.1), inset 0 0 0 1px rgba(240,185,11,0.1);
        }
        .form-input:hover:not(:focus) { border-color: var(--border-light); }

        /* 验证码输入框 */
        .verify-group {
            display: flex;
            gap: 10px;
        }
        .verify-group .form-input { flex: 1; }
        .btn-verify {
            padding: 12px 16px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--accent);
            font-size: 13px;
            font-weight: 500;
            font-family: var(--font-heading);
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s ease;
            min-width: 100px;
        }
        .btn-verify:hover:not(:disabled) {
            border-color: var(--accent);
            background: rgba(240,185,11,0.05);
        }
        .btn-verify:disabled {
            color: var(--text-muted);
            cursor: not-allowed;
        }

        /* 登录按钮 */
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--accent), #e8a400);
            border: none;
            border-radius: var(--radius);
            color: #1a1a1a;
            font-size: 15px;
            font-weight: 700;
            font-family: var(--font-heading);
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 8px;
            position: relative;
            overflow: hidden;
        }
        .btn-login::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transform: rotate(30deg);
            transition: all 0.6s;
        }
        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(240,185,11,0.3);
        }
        .btn-login:hover::after { left: 100%; }
        .btn-login:active { transform: scale(0.98); }

        /* 分割线 */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 24px 0;
            color: var(--text-muted);
            font-size: 12px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border), transparent);
        }

        /* 社交登录 */
        .social-login {
            display: flex;
            gap: 12px;
            justify-content: center;
        }
        .btn-social {
            flex: 1;
            padding: 12px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text-secondary);
            font-size: 13px;
            font-family: var(--font-heading);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .btn-social:hover {
            border-color: var(--border-light);
            color: var(--text);
            background: var(--surface);
        }

        /* 底部链接 */
        .login-footer {
            text-align: center;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid var(--border-light);
        }
        .login-footer a {
            color: var(--accent);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            transition: opacity 0.15s;
        }
        .login-footer a:hover { opacity: 0.8; }
        .footer-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 12px;
        }
        .guest-mode {
            color: var(--text-muted);
            font-size: 12px;
        }
        .guest-mode a {
            color: var(--text-secondary);
            text-decoration: underline;
            text-underline-offset: 2px;
        }

        /* 扫码登录 */
        .qr-section {
            text-align: center;
            padding: 20px 0;
        }
        .qr-code {
            width: 180px; height: 180px;
            margin: 0 auto 16px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        .qr-code::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            animation: scanLine 2s ease-in-out infinite;
        }
        @keyframes scanLine {
            0%, 100% { opacity: 0; transform: translateY(0); }
            50% { opacity: 1; transform: translateY(180px); }
        }
        .qr-placeholder {
            font-size: 48px;
            opacity: 0.3;
        }
        .qr-tip {
            font-size: 13px;
            color: var(--text-secondary);
        }
        .qr-tip strong { color: var(--accent); }

        /* 错误提示 */
        .error-msg {
            background: rgba(255,71,87,0.1);
            border: 1px solid rgba(255,71,87,0.2);
            border-radius: var(--radius);
            padding: 10px 14px;
            font-size: 13px;
            color: var(--down);
            margin-bottom: 16px;
            display: none;
            animation: shake 0.4s ease;
        }
        .error-msg.show { display: block; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-4px); }
            40%, 80% { transform: translateX(4px); }
        }

        /* 输入框图标 */
        .input-icon-wrap {
            position: relative;
        }
        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
            color: var(--text-muted);
            pointer-events: none;
            transition: color 0.2s;
        }
        .input-icon-wrap .form-input { padding-left: 40px; }
        .input-icon-wrap:focus-within .input-icon { color: var(--accent); }

        /* 密码可见切换 */
        .toggle-password {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 14px;
            padding: 4px;
            transition: color 0.2s;
        }
        .toggle-password:hover { color: var(--text-secondary); }

        /* 记住我 */
        .remember-wrap {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 18px;
        }
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-secondary);
            cursor: pointer;
        }
        .checkbox-label input {
            width: 16px; height: 16px;
            accent-color: var(--accent);
            cursor: pointer;
        }
        .forgot-link {
            font-size: 13px;
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.15s;
        }
        .forgot-link:hover { color: var(--accent); }

        /* 响应式 */
        @media (max-width: 480px) {
            .login-card { padding: 32px 24px; }
            .login-title { font-size: 20px; }
            .social-login { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    <div class="grid-overlay"></div>

    <div class="login-container">
        <div class="login-card">
            <!-- Logo -->
            <div class="login-header">
                <div class="login-logo">
                    <svg viewBox="0 0 56 56" fill="none">
                        <circle cx="28" cy="28" r="26" stroke="#F0B90B" stroke-width="1.5" opacity="0.3"/>
                        <path d="M28 8 L34 18 L40 14 L36 26 L44 30 L34 34 L30 44 L24 36 L16 40 L20 28 L12 24 L22 20 Z" fill="#F0B90B" opacity="0.9"/>
                        <circle cx="28" cy="26" r="3" fill="#0d1117"/>
                    </svg>
                </div>
                <h1 class="login-title">股小智</h1>
                <p class="login-subtitle">AI 驱动的股票分析平台</p>
            </div>

            <!-- 错误提示 -->
            <div class="error-msg" id="errorMsg"></div>

            <!-- 登录方式切换 -->
            <div class="login-tabs">
                <button class="login-tab active" data-tab="password">密码登录</button>
                <button class="login-tab" data-tab="phone">手机登录</button>
                <button class="login-tab" data-tab="qr">扫码登录</button>
            </div>

            <!-- 密码登录 -->
            <div class="login-form" id="form-password">
                <div class="form-group">
                    <label class="form-label">用户名 / 邮箱</label>
                    <div class="input-icon-wrap">
                        <span class="input-icon">👤</span>
                        <input type="text" class="form-input" id="username" placeholder="请输入用户名或邮箱">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">密码</label>
                    <div class="input-icon-wrap" style="position:relative;">
                        <span class="input-icon">🔒</span>
                        <input type="password" class="form-input" id="password" placeholder="请输入密码">
                        <button class="toggle-password" id="togglePassword" type="button">👁</button>
                    </div>
                </div>
                <div class="remember-wrap">
                    <label class="checkbox-label">
                        <input type="checkbox" id="rememberMe">
                        <span>记住我</span>
                    </label>
                    <a href="#" class="forgot-link">忘记密码？</a>
                </div>
                <button class="btn-login" id="btnLogin">登 录</button>
            </div>

            <!-- 手机登录 -->
            <div class="login-form" id="form-phone" style="display:none;">
                <div class="form-group">
                    <label class="form-label">手机号码</label>
                    <div class="input-icon-wrap">
                        <span class="input-icon">📱</span>
                        <input type="tel" class="form-input" id="phone" placeholder="请输入手机号码">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">验证码</label>
                    <div class="verify-group">
                        <input type="text" class="form-input" id="verifyCode" placeholder="请输入验证码">
                        <button class="btn-verify" id="btnVerify">获取验证码</button>
                    </div>
                </div>
                <button class="btn-login" id="btnLoginPhone">登 录</button>
            </div>

            <!-- 扫码登录 -->
            <div class="login-form" id="form-qr" style="display:none;">
                <div class="qr-section">
                    <div class="qr-code">
                        <span class="qr-placeholder">📱</span>
                    </div>
                    <p class="qr-tip">打开微信扫一扫<br>或 <strong>股小智 App</strong> 扫码登录</p>
                </div>
            </div>

            <!-- 分割线 -->
            <div class="divider">其他登录方式</div>

            <!-- 社交登录 -->
            <div class="social-login">
                <button class="btn-social" id="btnWechat">
                    <span>💬</span> 微信登录
                </button>
                <button class="btn-social" id="btnGithub">
                    <span>🐙</span> GitHub
                </button>
            </div>

            <!-- 底部 -->
            <div class="login-footer">
                <div class="footer-links">
                    <a href="#" id="linkRegister">注册账号</a>
                    <a href="/">游客模式</a>
                </div>
                <p class="guest-mode">无需登录即可浏览股票数据，<a href="/">立即体验 →</a></p>
            </div>
        </div>
    </div>

    <script>
    (function() {
        // 标签切换
        var tabs = document.querySelectorAll('.login-tab');
        var forms = {
            password: document.getElementById('form-password'),
            phone: document.getElementById('form-phone'),
            qr: document.getElementById('form-qr')
        };

        tabs.forEach(function(tab) {
            tab.addEventListener('click', function() {
                var target = this.dataset.tab;
                tabs.forEach(function(t) { t.classList.remove('active'); });
                this.classList.add('active');
                Object.keys(forms).forEach(function(key) {
                    forms[key].style.display = key === target ? 'block' : 'none';
                });
            });
        });

        // 密码可见切换
        var togglePwd = document.getElementById('togglePassword');
        var pwdInput = document.getElementById('password');
        if (togglePwd && pwdInput) {
            togglePwd.addEventListener('click', function() {
                var isPwd = pwdInput.type === 'password';
                pwdInput.type = isPwd ? 'text' : 'password';
                this.textContent = isPwd ? '🙈' : '👁';
            });
        }

        // 验证码倒计时
        var btnVerify = document.getElementById('btnVerify');
        if (btnVerify) {
            btnVerify.addEventListener('click', function() {
                if (this.disabled) return;
                var phone = document.getElementById('phone').value;
                if (!phone || phone.length !== 11) {
                    showError('请输入正确的手机号码');
                    return;
                }
                this.disabled = true;
                var count = 60;
                this.textContent = count + 's';
                var timer = setInterval(function() {
                    count--;
                    if (count <= 0) {
                        clearInterval(timer);
                        btnVerify.disabled = false;
                        btnVerify.textContent = '获取验证码';
                    } else {
                        btnVerify.textContent = count + 's';
                    }
                }, 1000);
                showError(''); // 清除错误
            });
        }

        // 错误提示
        function showError(msg) {
            var err = document.getElementById('errorMsg');
            if (!err) return;
            if (msg) {
                err.textContent = msg;
                err.classList.add('show');
            } else {
                err.classList.remove('show');
            }
        }

        // 登录按钮
        var btnLogin = document.getElementById('btnLogin');
        if (btnLogin) {
            btnLogin.addEventListener('click', function() {
                var username = document.getElementById('username').value.trim();
                var password = document.getElementById('password').value;
                if (!username) { showError('请输入用户名'); return; }
                if (!password) { showError('请输入密码'); return; }
                // 模拟登录成功
                this.textContent = '登录中...';
                setTimeout(function() {
                    window.location.href = '/';
                }, 1000);
            });
        }

        var btnLoginPhone = document.getElementById('btnLoginPhone');
        if (btnLoginPhone) {
            btnLoginPhone.addEventListener('click', function() {
                var phone = document.getElementById('phone').value.trim();
                var code = document.getElementById('verifyCode').value.trim();
                if (!phone) { showError('请输入手机号码'); return; }
                if (!code) { showError('请输入验证码'); return; }
                this.textContent = '登录中...';
                setTimeout(function() {
                    window.location.href = '/';
                }, 1000);
            });
        }

        // 回车登录
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                var activeTab = document.querySelector('.login-tab.active');
                if (activeTab && activeTab.dataset.tab === 'password' && btnLogin) {
                    btnLogin.click();
                } else if (activeTab && activeTab.dataset.tab === 'phone' && btnLoginPhone) {
                    btnLoginPhone.click();
                }
            }
        });

        // 社交登录提示
        document.getElementById('btnWechat').addEventListener('click', function() {
            showError('微信登录功能开发中');
        });
        document.getElementById('btnGithub').addEventListener('click', function() {
            showError('GitHub 登录功能开发中');
        });
        document.getElementById('linkRegister').addEventListener('click', function(e) {
            e.preventDefault();
            showError('注册功能开发中');
        });
    })();
    </script>
</body>
</html>
