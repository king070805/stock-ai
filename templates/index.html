<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>股小智 - AI 股票分析</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app">
        <header class="topbar">
            <div class="brand">
                <svg class="brand-icon" width="24" height="24" viewBox="0 0 24 24" fill="none"><rect x="3" y="18" width="3" height="4" rx="1" fill="#58a6ff"/><rect x="9" y="10" width="3" height="12" rx="1" fill="#58a6ff"/><rect x="15" y="4" width="3" height="18" rx="1" fill="#3fb950"/><circle cx="16.5" cy="4" r="3" fill="#3fb950" opacity="0.3"/></svg>
                <span class="brand-name">股小智</span>
            </div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="输入股票代码或名称...">
                <div class="search-results" id="searchResults"></div>
            </div>
            <div class="top-actions">
                <button class="btn-watchlist" onclick="toggleWatchlist()" title="自选股">⭐<span class="watchlist-count" id="watchlistCount">0</span></button>
            </div>
        </header>

        <div class="watchlist-bar" id="watchlistBar" style="display:none">
            <div class="watchlist-bar-header">
                <span>⭐ 我的自选</span>
                <button class="btn-close-sm" onclick="toggleWatchlist()">✕</button>
            </div>
            <div class="watchlist-items" id="watchlistItems">
                <span class="empty-hint">点击股票行的 ☆ 添加自选</span>
            </div>
        </div>

        <div class="main-layout">
            <main class="content">
                <div class="tabs">
                    <a href="#" class="tab" data-market="a" data-sort="change">涨跌幅</a>
                    <a href="#" class="tab active" data-market="a" data-sort="amount">成交额</a>
                    <a href="#" class="tab" data-market="a" data-sort="volume">成交量</a>
                    <a href="#" class="tab" data-market="us" data-sort="change">美股</a>
                </div>

                <div class="market-status" id="marketStatus">
                    <span class="status-dot"></span>
                    <span class="status-text">加载中...</span>
                </div>

                <div class="table-wrap">
                <table class="stock-table">
                    <thead>
                        <tr>
                            <th class="col-wl"></th>
                            <th class="col-rank">#</th>
                            <th class="col-name">名称</th>
                            <th class="col-price">最新价</th>
                            <th class="col-change">涨跌幅</th>
                            <th class="col-change hide-mobile">成交额</th>
                            <th class="col-change hide-mobile">PE</th>
                            <th class="col-action"></th>
                        </tr>
                    </thead>
                    <tbody id="stockTableBody">
                        <tr><td colspan="8" class="loading-row">加载中...</td></tr>
                    </tbody>
                </table>
                </div>
            </main>

            <aside class="ai-panel" id="aiPanel">
                <div class="panel-header">
                    <div class="ai-avatar">🤖</div>
                    <span>股小智 · 军师</span>
                </div>

                <div class="briefing-card" id="briefingCard">
                    <div class="briefing-chat">
                        <div class="chat-avatar">📋</div>
                        <div class="chat-bubble briefing-bubble">
                            <div class="chat-label">今日简报</div>
                            <div class="chat-text" id="briefingContent">加载中...</div>
                        </div>
                    </div>
                </div>

                <div class="analysis-card" id="analysisCard" style="display:none">
                    <div class="analysis-header">
                        <span class="analysis-stock-name" id="analysisStockName"></span>
                        <span class="analysis-verdict" id="analysisVerdictBadge"></span>
                        <button class="btn-close" onclick="closeAnalysis()">✕</button>
                    </div>

                    <div class="stock-info-card" id="stockQuickInfo"></div>

                    <div class="chart-container" id="chartContainer">
                        <canvas id="klineChart" height="200"></canvas>
                    </div>

                    <div class="analysis-chat" id="analysisChat">
                        <div class="chat-avatar">🤖</div>
                        <div class="chat-bubble ai-bubble">
                            <div class="chat-label">军师分析</div>
                            <div class="chat-text" id="analysisBody">分析中...</div>
                        </div>
                    </div>

                    <button class="btn-share" onclick="shareAnalysis()" style="display:none" id="btnShare">📤 生成分享图片</button>
                    <button class="btn-memory" onclick="toggleMemory()">📋 我的足迹</button>
                    <div class="memory-panel" id="memoryPanel" style="display:none">
                        <div class="memory-content" id="memoryContent"></div>
                    </div>
                </div>

                <div class="premium-card">
                    <div class="premium-icon">🔔</div>
                    <div class="premium-title">AI异动预警</div>
                    <div class="premium-desc">你关注的股票有任何风吹草动，AI第一时间帮你解读</div>
                    <div class="premium-price">
                        <span class="price-num">9.9</span>
                        <span class="price-unit">元/月</span>
                    </div>
                    <button class="btn-premium" onclick="showPay()">立即订阅</button>
                </div>
            </aside>
        </div>
    </div>

    <div class="modal-overlay" id="payModal" style="display:none">
        <div class="modal">
            <button class="modal-close" onclick="closePay()">关闭</button>
            <h3>订阅 AI异动预警</h3>
            <p>扫码支付 9.9 元/月</p>
            <div class="qr-placeholder">
                <div class="qr-icon">📱</div>
                <p>微信扫码支付</p>
                <p class="qr-hint">支付后联系客服开通</p>
            </div>
            <p class="pay-note">💡 内测期间，扫码支付后截图发给客服，24小时内开通</p>
        </div>
    </div>

    <div class="toast" id="toast"></div>
    <script src="/static/script.js"></script>
</body>
</html>
