name: Keep Railway Service Alive

on:
  schedule:
    # 每10分钟运行一次
    - cron: '*/10 * * * *'
  workflow_dispatch:  # 也支持手动触发

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping website to keep alive
        run: |
          echo "Pinging website at $(date)"
          curl -s -o /dev/null -w "%{http_code}" \
            --max-time 30 \
            --retry 2 \
            --retry-delay 5 \
            https://stock-ai.up.railway.app/ || true
          echo " - Ping completed"
